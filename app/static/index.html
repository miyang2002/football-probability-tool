<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>足球赔率建议工具</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>足球赔率建议</h1>
        <p>根据体彩真实赔率给出玩法和串关建议</p>
      </div>
      <div class="top-actions">
        <div id="feed-status" class="feed-status">数据源加载中</div>
        <button id="refresh-button" class="icon-button" title="刷新比赛" aria-label="刷新比赛">↻</button>
      </div>
    </header>

    <main class="layout">
      <aside class="sidebar">
        <div class="panel">
          <div class="panel-title">未开赛比赛</div>
          <div id="match-window" class="segmented window-controls">
            <button data-window="next" class="active">下一比赛日</button>
            <button data-window="tomorrow">明天</button>
            <button data-window="3d">3天</button>
            <button data-window="7d">7天</button>
          </div>
          <div id="match-list" class="match-list"></div>
        </div>
      </aside>

      <section class="content">
        <section class="panel">
          <div class="panel-title">五种玩法建议</div>
          <div id="decision-comparison"></div>
        </section>

        <section class="panel">
          <div class="parlay-header">
            <div>
              <div class="panel-title">串关分析</div>
              <p>勾选至少两场比赛后，按真实赔率给出串关建议。</p>
            </div>
          </div>
          <div id="parlay-results" class="parlay-results"></div>
        </section>
      </section>
    </main>

    <script type="module" src="/static/app.js"></script>
  </body>
</html>
