services:
  - type: web
    name: football-probability-tool
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: FOOTBALL_DATA_PROVIDER
        value: auto
      - key: SPORTTERY_REFRESH_SECONDS
        value: "30"
      - key: THE_ODDS_API_KEY
        sync: false
      - key: THE_ODDS_REFRESH_SECONDS
        value: "300"
