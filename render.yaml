services:
  - type: web
    name: football-probability-tool
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: FOOTBALL_DATA_PROVIDER
        value: sporttery
      - key: SPORTTERY_REFRESH_SECONDS
        value: "30"
